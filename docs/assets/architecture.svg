<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 288" width="880" height="288" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" fill="none">
  <!-- Neutral stroke/text (#8b949e) reads on both GitHub light and dark themes; background is transparent. -->
  <style>
    .box { stroke: #8b949e; stroke-width: 1.5; fill: none; }
    .dash { stroke: #8b949e; stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; }
    .line { stroke: #8b949e; stroke-width: 1.5; }
    .t { fill: #8b949e; }
    .title { font-size: 15px; font-weight: 700; }
    .label { font-size: 13px; }
    .sub { font-size: 11px; }
  </style>

  <!-- Engine core -->
  <rect class="box" x="245" y="20" width="390" height="66" rx="8"/>
  <text class="t title" x="440" y="46" text-anchor="middle">ENGINE CORE</text>
  <text class="t sub" x="440" y="66" text-anchor="middle">spring · gestures · snap math · focus trap · scroll lock · stack</text>

  <!-- /overlay side note -->
  <line class="dash" x1="635" y1="53" x2="690" y2="53"/>
  <rect class="dash" x="690" y="29" width="178" height="48" rx="8"/>
  <text class="t label" x="779" y="50" text-anchor="middle">/overlay subpath</text>
  <text class="t sub" x="779" y="66" text-anchor="middle">standalone slide-up panel</text>

  <!-- Bus from engine down to the four columns -->
  <line class="line" x1="440" y1="86" x2="440" y2="128"/>
  <line class="line" x1="185" y1="128" x2="695" y2="128"/>
  <line class="line" x1="185" y1="128" x2="185" y2="160"/>
  <line class="line" x1="355" y1="128" x2="355" y2="160"/>
  <line class="line" x1="525" y1="128" x2="525" y2="160"/>
  <line class="line" x1="695" y1="128" x2="695" y2="160"/>

  <!-- Row 1 adapters -->
  <rect class="box" x="110" y="160" width="150" height="46" rx="8"/>
  <text class="t label" x="185" y="188" text-anchor="middle">React</text>
  <rect class="box" x="280" y="160" width="150" height="46" rx="8"/>
  <text class="t label" x="355" y="188" text-anchor="middle">Preact</text>
  <rect class="box" x="450" y="160" width="150" height="46" rx="8"/>
  <text class="t label" x="525" y="188" text-anchor="middle">Vue 3</text>
  <rect class="box" x="620" y="160" width="150" height="46" rx="8"/>
  <text class="t label" x="695" y="188" text-anchor="middle">Svelte</text>

  <!-- Row 2 adapters -->
  <rect class="box" x="110" y="222" width="150" height="46" rx="8"/>
  <text class="t label" x="185" y="250" text-anchor="middle">Solid</text>
  <rect class="box" x="280" y="222" width="150" height="46" rx="8"/>
  <text class="t label" x="355" y="250" text-anchor="middle">Qwik</text>
  <rect class="box" x="450" y="222" width="150" height="46" rx="8"/>
  <text class="t label" x="525" y="250" text-anchor="middle">Web Component</text>
  <rect class="box" x="620" y="222" width="150" height="46" rx="8"/>
  <text class="t label" x="695" y="250" text-anchor="middle">Vanilla</text>
</svg>
