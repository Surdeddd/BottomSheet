name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: CSS drift-guard (baseStyles.ts in sync with bottom-sheet.css)
        run: |
          npm run sync:css
          if ! git diff --exit-code src/web-component/baseStyles.ts; then
            echo "::error::src/web-component/baseStyles.ts is out of sync with src/styles/bottom-sheet.css."
            echo "Run \`npm run sync:css\` and commit \`src/web-component/baseStyles.ts\`."
            exit 1
          fi
      - name: Type check
        run: npx tsc --noEmit
      - name: Build library
        run: npm run build
      - name: Unit tests
        run: npx vitest run --coverage --reporter=verbose
      - name: Package contract (publint + attw + dist smoke imports)
        run: |
          npx publint
          npx attw --pack . --profile node16 --exclude-entrypoints ./styles ./styles.css ./themes/ios ./themes/ios.css ./themes/material ./themes/material.css ./themes/vercel ./themes/vercel.css
          for f in index react preact vue element svelte overlay qwik; do node -e "import('./dist/$f.js')"; done
      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v4
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    name: E2E (Playwright - ${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            playwright_project: mobile-chrome
          - project: webkit
            playwright_project: mobile-safari
          - project: firefox
            playwright_project: firefox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build library (demo + dist-dependent tests need it)
        run: npm run build
      - name: Install Playwright browser (${{ matrix.project }})
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: E2E tests (${{ matrix.playwright_project }})
        run: npx playwright test --project=${{ matrix.playwright_project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

  e2e-visual:
    name: E2E (Playwright - visual-regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build library (demo needs dist for theme resolution)
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Visual-regression tests
        run: npx playwright test tests/e2e/visual-regression.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7

  publish-check:
    name: Pack tarball (PR only)
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: npm pack dry-run
        run: npm pack --dry-run
