name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit arrives on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for tokenless Codecov upload (matrix.node == 20)
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: CSS drift-guard (baseStyles.ts in sync with bottom-sheet.css)
        run: |
          npm run sync:css
          if ! git diff --exit-code src/web-component/baseStyles.ts; then
            echo "::error::src/web-component/baseStyles.ts is out of sync with src/styles/bottom-sheet.css."
            echo "Run \`npm run sync:css\` and commit \`src/web-component/baseStyles.ts\`."
            exit 1
          fi
      - name: Type check
        run: npx tsc --noEmit
      - name: Build library
        run: npm run build
      - name: Unit tests
        run: npx vitest run --coverage --reporter=verbose
      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v4
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  e2e:
    name: E2E (Playwright - ${{ matrix.project }})
    runs-on: ubuntu-latest
    # Run chromium and webkit projects in parallel jobs so a WebKit-only
    # regression doesn't block the chromium signal (and vice versa). Also
    # speeds total wall-clock vs running both browsers serially in one job.
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            playwright_project: mobile-chrome
          - project: webkit
            playwright_project: mobile-safari
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build library (demo + dist-dependent tests need it)
        run: npm run build
      - name: Install Playwright browser (${{ matrix.project }})
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: E2E tests (${{ matrix.playwright_project }})
        run: npx playwright test --project=${{ matrix.playwright_project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

  # Visual-regression projects (5 breakpoints) all use Desktop Chrome →
  # keep them in the chromium-only job to avoid double-installing browsers.
  e2e-visual:
    name: E2E (Playwright - visual-regression)
    runs-on: ubuntu-latest
    # Visual-regression spec is currently `test.skip()`-gated on CI inside
    # tests/e2e/visual-regression.spec.ts because Linux baselines have not
    # yet been generated and committed. The job runs (so size-budget +
    # browser install pipelines stay warm) and reports green via skipped
    # tests. Re-enable real assertions by committing snapshot PNGs and
    # removing the skip guard at the top of the spec.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build library (demo needs dist for theme resolution)
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Visual-regression tests
        run: npx playwright test tests/e2e/visual-regression.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7

  publish-check:
    name: Pack tarball (PR only)
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsup
      - name: npm pack dry-run
        run: npm pack --dry-run
