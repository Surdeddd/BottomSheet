name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=high
      - name: Audit full tree (advisory, non-blocking)
        if: always()
        run: npm audit --audit-level=high || echo "dev dep advisories found"
