name: Bundle size

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: bundle-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size:
    name: Gzip delta vs main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps (PR)
        run: npm ci

      - name: Build (PR)
        run: npm run build

      - name: Measure PR bundle
        run: node scripts/check-bundle-size.mjs measure --out=head-sizes.json

      - name: Enforce absolute size limits (size-limit)
        run: npx size-limit

      - name: Stash PR sizes
        run: |
          mkdir -p /tmp/bundle-size
          cp head-sizes.json /tmp/bundle-size/head-sizes.json
          cp scripts/check-bundle-size.mjs /tmp/bundle-size/check-bundle-size.mjs

      - name: Checkout main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .
          cp /tmp/bundle-size/check-bundle-size.mjs scripts/check-bundle-size.mjs

      - name: Install deps (main)
        run: npm ci

      - name: Build (main)
        run: npm run build

      - name: Measure main bundle
        run: node scripts/check-bundle-size.mjs measure --out=base-sizes.json

      - name: Compare and write report
        id: compare
        run: |
          set +e
          node scripts/check-bundle-size.mjs compare \
            --base=base-sizes.json \
            --head=/tmp/bundle-size/head-sizes.json \
            --threshold=5 \
            --out=bundle-delta.md
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: bundle-size
          path: bundle-delta.md

      - name: Fail if over budget
        if: steps.compare.outputs.exit != '0'
        run: |
          echo "::error::Gzipped bundle grew by more than the configured threshold."
          exit 1
