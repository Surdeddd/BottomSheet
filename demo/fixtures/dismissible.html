<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>dismissible fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
      }
      #controls {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 999;
        display: flex;
        gap: 8px;
        padding: 12px;
        background: #fff;
      }
      #controls button {
        padding: 8px 16px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <button id="open">open</button>
      <button id="close">close</button>
    </div>
    <div id="mount"></div>
    <script type="module" src="./dismissible.ts"></script>
  </body>
</html>
