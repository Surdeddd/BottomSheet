<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>waapi settle fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
      }
      .bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10000;
        display: flex;
        gap: 8px;
        padding: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <button id="snap-half" type="button">half</button>
      <button id="snap-full" type="button">full</button>
      <button id="close" type="button">close</button>
    </div>
    <div id="mount"></div>
    <script type="module" src="./waapi.ts"></script>
  </body>
</html>
